<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise · Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>💰 FinWise</h1>
        <p class="subtitle">Smart personal finance tracker</p>
<button id="logoutBtn" class="logout-btn">Logout</button>
  
    </header>

    <main>
        <!-- Dashboard Cards -->
        <section class="dashboard">
            <h2>Dashboard</h2>
            <div class="cards">
                <div class="card balance">
                    <h3>💵 Current Balance</h3>
                    <p id="balance">₹0</p>
                </div>
                <div class="card income">
                    <h3>📈 Total Income</h3>
                    <p id="total-income">₹0</p>
                </div>
                <div class="card expenses">
                    <h3>📉 Total Expenses</h3>
                    <p id="total-expenses">₹0</p>
                </div>
            </div>
        </section>

        <!-- Add / Edit Transaction -->
        <section class="transaction-form">
            <h2>➕ Add Transaction</h2>
            <form id="transactionForm">
                <input type="text" id="title" placeholder="Title (e.g. Groceries)" required>
                <input type="number" id="amount" placeholder="Amount" min="0.01" step="0.01" required>
                <select id="type" required>
                    <option value="" disabled selected>-- Type --</option>
                    <option value="income">💰 Income</option>
                    <option value="expense">🛒 Expense</option>
                </select>
                <select id="category" required>
                    <option value="" disabled selected>-- Category --</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Rent">🏠 Rent</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Travel">✈️ Travel</option>
                    <option value="Others">📦 Others</option>
                </select>
                <input type="date" id="date" required>
                <button type="submit">Save Transaction</button>
                <button type="button" id="cancelEdit" style="display:none;">Cancel Edit</button>
            </form>
        </section>

        <!-- Charts -->
        <section class="charts">
            <h2>📊 Insights</h2>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
                <p class="chart-label">Expenses by category</p>
            </div>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
                <p class="chart-label">Income vs Expense (last 7 days)</p>
            </div>
        </section>

        <!-- Transaction History with Sorting & Searching -->
        <section class="history">
            <h2>📋 History</h2>
            <div class="controls">
                <div class="sort">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy">
                        <option value="date">Date (newest)</option>
                        <option value="amount">Amount (high to low)</option>
                        <option value="category">Category</option>
                    </select>
                </div>
                <div class="search">
                    <input type="text" id="searchInput" placeholder="🔍 Search title...">
                    <button id="searchBtn">Search</button>
                </div>
                <div class="export">
                    <button id="exportCsv">📥 Export CSV</button>
                </div>
            </div>
            <ul id="transaction-list">
                <!-- Transactions will be injected here -->
            </ul>
            <p id="searchResult" class="search-result"></p>
        </section>
    </main>

    <!-- Budget Alert Modal (simple) -->
    <div id="budgetModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="budgetMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
